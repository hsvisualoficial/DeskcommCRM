# DeskcommCRM — stack de produção adaptada para Easypanel.
# Baseado em docker-compose.prod.yml, com uma diferença estrutural:
#   o Easypanel já tem proxy reverso + TLS automático (Let's Encrypt) por
#   domínio/serviço — por isso o serviço "caddy" foi REMOVIDO daqui. No
#   painel do Easypanel, aponte o domínio público pra porta 3000 do serviço
#   "app" diretamente (Project → app → Domains → Add Domain).
#
# waha/redis/srh/scheduler continuam SEM porta publicada — só o "app" fala
# com eles, via rede interna do compose (nomes de serviço = DNS interno).
#
# Deploy no Easypanel:
#   1. Criar projeto do tipo "Compose", colar este arquivo (ou apontar pro
#      repo Git e escolher este compose file).
#   2. Colar o conteúdo do .env gerado nas "Environment Variables" do projeto
#      (ou habilitar env_file se o Easypanel dessa versão suportar upload).
#   3. Deploy. O build do Next.js (~15-25min num VPS) precisa de >=4GB RAM
#      (NODE_OPTIONS=--max-old-space-size=4096 já setado no Dockerfile) —
#      confirme o plano da VPS antes de rodar.
#   4. Em app → Domains, adicionar zap.hscrm.com.br apontando pra porta 3000,
#      com HTTPS automático (Let's Encrypt gerenciado pelo próprio Easypanel).

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    depends_on:
      srh:
        condition: service_started
      waha:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging: *default-logging
    networks: [internal]

  waha:
    image: ${WAHA_IMAGE:-devlikeapro/waha}
    restart: unless-stopped
    environment:
      WAHA_API_KEY: "sha512:${WAHA_API_KEY_SHA512}"
      WHATSAPP_HOOK_URL: ${WAHA_WEBHOOK_BASE_URL}/api/v1/webhooks/waha
      WHATSAPP_HOOK_EVENTS: "message,message.any,message.ack,session.status,state.change"
      WHATSAPP_HOOK_HMAC: ${WAHA_HMAC_SECRET}
      WAHA_DEFAULT_ENGINE: ${WAHA_DEFAULT_ENGINE:-NOWEB}
      WAHA_DASHBOARD_ENABLED: "false"
    volumes:
      - waha-data:/app/.sessions
      - waha-media:/app/.media
    logging: *default-logging
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging: *default-logging
    networks: [internal]

  srh:
    image: hiett/serverless-redis-http:latest
    restart: unless-stopped
    environment:
      SRH_MODE: env
      SRH_TOKEN: ${SRH_TOKEN}
      SRH_CONNECTION_STRING: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    networks: [internal]

  scheduler:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      TZ: UTC
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl tzdata >/dev/null 2>&1
        cat > /etc/crontabs/root <<EOF
        * * * * * curl -fsS -m25 -H "Authorization: Bearer $$INTERNAL_SECRET" http://app:3000/api/v1/cron/agent-dispatcher >/dev/null 2>&1
        */5 * * * * curl -fsS -m25 -H "Authorization: Bearer $$INTERNAL_SECRET" "http://app:3000/api/v1/cron/storage-redaction?limit=50" >/dev/null 2>&1
        0 12 * * * curl -fsS -m60 -H "Authorization: Bearer $$INTERNAL_SECRET" http://app:3000/api/v1/cron/lgpd-sla-watcher >/dev/null 2>&1
        30 3 * * * curl -fsS -m120 -H "Authorization: Bearer $$INTERNAL_SECRET" http://app:3000/api/v1/cron/kb-conversations-batch >/dev/null 2>&1
        EOF
        exec crond -f -l 2
    logging: *default-logging
    networks: [internal]

volumes:
  waha-data:
  waha-media:

networks:
  internal:
    driver: bridge
